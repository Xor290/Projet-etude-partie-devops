apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "althea-backend.fullname" . }}
  labels:
    {{- include "althea-backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "althea-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "althea-backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.migrations.enabled }}
      initContainers:
        - name: migrations
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["php", "bin/console", "doctrine:migrations:migrate", "--no-interaction"]
          envFrom:
            - configMapRef:
                name: {{ include "althea-backend.fullname" . }}
            - secretRef:
                name: {{ include "althea-backend.fullname" . }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "althea-backend.fullname" . }}
            - secretRef:
                name: {{ include "althea-backend.fullname" . }}
          {{- if .Values.jwt.privateKey }}
          volumeMounts:
            - name: jwt-keys
              mountPath: /app/config/jwt
              readOnly: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.jwt.privateKey }}
      volumes:
        - name: jwt-keys
          secret:
            secretName: {{ include "althea-backend.fullname" . }}
            items:
              - key: JWT_PRIVATE_KEY
                path: private.pem
              - key: JWT_PUBLIC_KEY
                path: public.pem
      {{- end }}
