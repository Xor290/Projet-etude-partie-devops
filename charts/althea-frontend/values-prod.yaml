replicaCount: 2

image:
  tag: prod

apiUrl: "https://api.althea.com/api"

ingress:
  enabled: true
  host: althea.com
  tls:
    - secretName: althea-frontend-tls
      hosts:
        - althea.com

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "400m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
